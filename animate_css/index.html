<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="animate.min.css">
    <link rel="icon" href="icon.png">

    <link rel="stylesheet" href="magic-master/magic-master/dist/magic.css">
    <title>Document</title>
</head>

<body>
    CSS ANIMATIONS
    <div class="animate__slower	3s animate__infinite	infinite animate__animated animate__rubberBand">1</div>
    <div class="animate__slower	3s animate__infinite	infinite animate__animated animate__slideOutDown">2</div>
    <div class="animate__slower	3s animate__infinite	infinite animate__animated animate__slideInLeft">3</div>
    <div class="animate__slower	3s animate__infinite	infinite animate__animated animate__zoomOut">4</div>
    <div class="animate__slower	3s animate__infinite	infinite animate__animated animate__zoomIn">5</div>
    MAGIC ANIMATIONS
    <div class="magictime perspectiveRight" style="animation-duration: 5s; animation-iteration-count: infinite;">1</div>
    <div class="magictime swap" style="animation-duration: 5s; animation-iteration-count: infinite;">2</div>
    <h1 align="center" class="magictime foolishOut"
        style="animation-duration: 5s; animation-iteration-count: infinite;">3.Sabin Gautam</h1>
</body>

</html>
